<!doctype html>
<!-- 피그마 Iframe 샌드박스와 외부 Next.js 웹앱 간의 postMessage를 양방향 중계하는 플러그인 UI 브릿지 문서입니다. -->
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #0b0f19;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <!-- 개발 시에는 localhost:3000을 바라보고, Vercel 배포 시에는 해당 배포 URL로 변경하여 사용합니다. -->
    <iframe id="webapp" src="https://file-optimizer.vercel.app/"></iframe>

    <script>
      const iframe = document.getElementById("webapp");

      // 1. 피그마 메인 스레드(code.js) -> Iframe 내부 웹앱으로 메세지 중계
      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (message && iframe.contentWindow) {
          iframe.contentWindow.postMessage(message, "*");
        }
      };

      // 2. Iframe 내부 웹앱 -> 피그마 메인 스레드(code.js)로 메세지 중계
      window.addEventListener("message", (event) => {
        const drop = event.data.pluginDrop;
        if (drop) {
          // 내부 웹앱의 좌표는 중계 iframe을 기준으로 하므로, UI 내부 위치를 더해 Figma에 전달합니다.
          const bounds = iframe.getBoundingClientRect();
          parent.postMessage(
            {
              pluginDrop: {
                ...drop,
                clientX: drop.clientX + bounds.left,
                clientY: drop.clientY + bounds.top,
              },
            },
            "*",
          );
          return;
        }

        // 보안을 위한 출처 검증이 필요할 경우 추가할 수 있습니다.
        const message = event.data.pluginMessage;
        if (message) {
          // 피그마 메인 스레드로 메세지를 패싱합니다.
          parent.postMessage({ pluginMessage: message }, "*");
        }
      });
    </script>
  </body>
</html>
